name: Build Desktop Installers

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # This triggers two separate parallel builds
        os: [windows-latest, ubuntu-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    - name: Copy Dependencies
      run: mvn dependency:copy-dependencies -DoutputDirectory=target/libs

    # --- WINDOWS BUILD (.exe) ---
    - name: Create Windows EXE
      if: matrix.os == 'windows-latest'
      run: |
        jpackage --type exe --name "NetworkingChat" `
        --input target/libs --main-jar networking-assignment-1.0-SNAPSHOT.jar `
        --main-class com.assignment.networkingassignment.MainApp `
        --win-shortcut --win-menu --dest dist/

    # --- UBUNTU BUILD (.deb) ---
    - name: Create Ubuntu DEB
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get install -y fakeroot
        jpackage --type deb --name "networking-chat" \
        --input target/libs --main-jar networking-assignment-1.0-SNAPSHOT.jar \
        --main-class com.assignment.networkingassignment.MainApp \
        --linux-shortcut --dest dist/

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: chat-server-${{ matrix.os }}
        path: dist/
